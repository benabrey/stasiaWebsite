<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Aesthetics By Stasia</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

  <div class="page-transition"></div>
  <div class="cursor"></div>
  <div class="loader">
    <span class="loader-text">Aesthetics By Stasia</span>
  </div>

  <!-- NAV -->
  <nav>
      <a href="/index.html" class="nav-logo">Aesthetics By Stasia</a>
      <button class="nav-toggle" id="navToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/index.html" class="active">Home</a></li>
        <li><a href="/gallery.html">Gallery</a></li>
        <li><a href="/contact.html">Contact</a></li>
        <li><a href="/pricing.html">Pricing</a></li>
      </ul>
  </nav>

  <!-- HERO -->
  <section class="gallery-page-hero">
    <div class="hero-bg">
      <img src="/assets/images/DSC_9922-3.jpg" alt="Gallery" />
    </div>
    <div class="hero-content reveal-left">
      <p class="section-label" style="color:var(--stone)">Portfolio</p>
      <h1 class="section-title" style="color:var(--warm-white)">Explore My<br><em>Latest Work</em></h1>
    </div>
  </section>

  <!-- FILTER BUTTONS -->
  <div class="gallery-filter stagger">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="portrait">Portraits</button>
    <button class="filter-btn" data-filter="weddings">Weddings</button>
    <button class="filter-btn" data-filter="couple">Couples</button>
  </div>

  <!-- MASONRY GRID -->
  <div class="gallery-masonry">
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/running-field.JPG" alt="" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/friends-stack.jpg" alt="" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/spinning.JPG" alt="" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/leading.jpg" alt="" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/2FSpin.jpg" alt="" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/hairtuck.jpg" alt="" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/Lift.jpg" alt="" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/AbiHarlie.jpg" alt="" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/two-white.jpg" alt="" />
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox">
    <img class="lightbox-img" src="" alt="Full size" />
    <button class="lightbox-close">Close ×</button>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">Aesthetics By Stasia</div>
    <div class="footer-copy">&copy; 2025 Aesthetics By Stasia. All rights reserved.</div>
    <div class="footer-social">
      <a href="https://www.instagram.com/aestheticbystasiaphotography">Instagram</a>
      <a href="https://pinterest.com/">Pinterest</a>
    </div>
  </footer>

  <script src="/assets/js/script.js"></script>
</body>
</html>
