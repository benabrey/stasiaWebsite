<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary Meta -->
  <title>Gallery | Aesthetics By Stasia - Kelowna Photographer</title>
  <meta name="description" content="Kelowna photographer specializing in weddings, couples, and portrait photography. Serving West Kelowna, the Okanagan, and beyond. Airy, cinematic, and authentic imagery.">
  <meta name="keywords" content="Kelowna photographer, Kelowna wedding photographer, Okanagan photographer, couples photography Kelowna, portrait photographer Kelowna, West Kelowna photographer, elopement photographer BC">
  <meta name="author" content="Stasia">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://aestheticsbystasiaphotography.com/">

  <!-- Open Graph (Facebook, Instagram link previews) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aestheticsbystasiaphotography.com/">
  <meta property="og:title" content="Aesthetics By Stasia | Kelowna Wedding & Couples Photographer">
  <meta property="og:description" content="Airy, cinematic photography for couples, weddings, and portraits in Kelowna and the Okanagan.">
  <meta property="og:image" content="https://aestheticsbystasiaphotography.com/assets/images/og-image.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Aesthetics By Stasia | Kelowna Wedding & Couples Photographer">
  <meta name="twitter:description" content="Airy, cinematic photography for couples, weddings, and portraits in Kelowna and the Okanagan.">
  <meta name="twitter:image" content="https://aestheticsbystasiaphotography.com/assets/images/og-image.jpg">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">

  <link rel="stylesheet" href="/assets/css/styles.min.css">
</head>
<body>

  <div class="page-transition"></div>
  <div class="cursor"></div>
  <div class="loader">
    <span class="loader-text">Aesthetics By Stasia</span>
  </div>

  <!-- NAV -->
  <nav>
      <a href="/index.html" class="nav-logo">Aesthetics By Stasia</a>
      <button class="nav-toggle" id="navToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/index.html" class="active">Home</a></li>
        <li><a href="/gallery.html">Gallery</a></li>
        <li><a href="/contact.html">Contact</a></li>
        <li><a href="/pricing.html">Pricing</a></li>
      </ul>
  </nav>

  <!-- HERO -->
  <section class="gallery-page-hero">
    <div class="hero-bg">
      <img src="/assets/images/og-image.jpg" alt="Gallery" />
    </div>
    <div class="hero-content reveal-left">
      <p class="section-label" style="color:var(--stone)">Portfolio</p>
      <h2 class="section-title" style="color:var(--warm-white)">Explore My<br><em>Latest Work</em></h2>
    </div>
  </section>

  <!-- FILTER BUTTONS -->
  <div class="gallery-filter stagger">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="portrait">Portraits</button>
    <button class="filter-btn" data-filter="weddings">Weddings</button>
    <button class="filter-btn" data-filter="couple">Couples</button>
  </div>

  <!-- MASONRY GRID -->
  <div class="gallery-masonry">
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/running-field.JPG" loading="lazy" alt="Couple running in field - Kelowna" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/friends-stack.jpg" loading="lazy" alt="Friends getting photographed - Kelowna" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/spinning.JPG" loading="lazy" alt="Couple spinning for photo - Kelowna" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/leading.jpg" loading="lazy" alt="Couple walking - Kelowna" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/2FSpin.jpg" loading="lazy" alt="Two friends having fun - Kelowna" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/hairtuck.jpg" loading="lazy" alt="Couples photoshoot - Kelowna" />
    </div>
    <div class="masonry-item" data-category="couple">
      <img src="/assets/images/Lift.jpg" loading="lazy" alt="Couple doing lift - Kelowna" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/AbiHarlie.jpg" loading="lazy" alt="Holding hands walking - Kelowna" />
    </div>
    <div class="masonry-item" data-category="portrait">
      <img src="/assets/images/two-white.jpg" loading="lazy" alt="Friends - Kelowna " />
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox">
    <img class="lightbox-img" src="" alt="Full size" />
    <button class="lightbox-close">Close ×</button>
  </div>

  <div style="text-align:center; padding: 2rem 0 4rem;">
    <p style="color:var(--taupe); margin-bottom:1rem; font-family:var(--font-display); font-size:1.2rem;">Ready to book?</p>
    <a href="/contact.html" class="hero-cta" style="opacity:1;transform:none;animation:none;color:var(--bark);border-color:var(--bark);"><span>Get in Touch</span></a>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">Aesthetics By Stasia</div>
    <div class="footer-copy">&copy; 2025 Aesthetics By Stasia. All rights reserved.</div>
    <div class="footer-social">
      <a href="/gallery.html">Gallery</a>
      <a href="/pricing.html">Pricing</a>
      <a href="/contact.html">Contact</a>
      <a href="https://instagram.com/aestheticbystasiaphotography">Instagram</a>
    </div>
  </footer>

  <script src="/assets/js/script.min.js"></script>
</body>
</html>
