<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Aesthetics By Stasia</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Aesthetics By Stasia</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Gallery</h1>
            <p>Explore My Latest Work</p>
        </div>
    </header>

    <section class="gallery">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="portrait">Portraits</button>
                <button class="filter-btn" data-filter="event">Events</button>
                <button class="filter-btn" data-filter="product">Products</button>
            </div>

            <div class="gallery-grid">
                <div class="gallery-item" data-category="portrait">
                    <img src="assets/images/placeholder-1.jpg" alt="Portrait Gallery Item">
                    <div class="gallery-overlay">
                        <p>Professional Portrait</p>
                    </div>
                </div>
                <div class="gallery-item" data-category="event">
                    <img src="assets/images/placeholder-2.jpg" alt="Event Gallery Item">
                    <div class="gallery-overlay">
                        <p>Wedding Photography</p>
                    </div>
                </div>
                <div class="gallery-item" data-category="product">
                    <img src="assets/images/placeholder-3.jpg" alt="Product Gallery Item">
                    <div class="gallery-overlay">
                        <p>Product Showcase</p>
                    </div>
                </div>
                <div class="gallery-item" data-category="portrait">
                    <img src="assets/images/placeholder-4.jpg" alt="Portrait Gallery Item">
                    <div class="gallery-overlay">
                        <p>Fashion Portrait</p>
                    </div>
                </div>
                <div class="gallery-item" data-category="event">
                    <img src="assets/images/placeholder-5.jpg" alt="Event Gallery Item">
                    <div class="gallery-overlay">
                        <p>Birthday Celebration</p>
                    </div>
                </div>
                <div class="gallery-item" data-category="product">
                    <img src="assets/images/placeholder-6.jpg" alt="Product Gallery Item">
                    <div class="gallery-overlay">
                        <p>Product Details</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Aesthetics By Stasia. All rights reserved.</p>
            <div class="social-links">
                <a href="https://www.instagram.com/aestheticbystasiaphotography" class="social-icon">Instagram</a>
            </div>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
